name: Bygg og deploy

on:
  push:
    branches:
      - main
      - 'dev-**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 3'
      timezone: 'Europe/Oslo'
  workflow_dispatch:

jobs:
  build:
    name: build docker image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.x'
          cache: 'gradle'
      - name: test and build
        run: ./gradlew test build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: build docker image
        if: ${{github.ref_name == 'main' || startsWith(github.ref_name, 'dev-')}}
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: tbd
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deployDev:
    name: deploy to dev
    needs: build
    runs-on: ubuntu-latest
    if: ${{github.ref_name == 'main' || startsWith(github.ref_name, 'dev-')}}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/dev.yml
          IMAGE: ${{ needs.build.outputs.image }}
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/purring-job.yml, .nais/dev-db-policy.yml
          IMAGE: ${{ needs.build.outputs.image }}
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/dev.yml,.nais/dev-db-policy.yml
          IMAGE: ${{ needs.build.outputs.image }}
          VARS: .nais/entra-id-vars.yml
